<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <title>Deployment Under Process</title>
    <style>
        :root {
            --first-color: hsl(290, 100%, 65%); /* Neon Magenta/Violet */
            --second-color: hsl(180, 100%, 50%); /* Neon Cyan */
            --bg-color: #050508;
            --card-bg: rgba(255, 255, 255, 0.02);
            --border-color: rgba(255, 255, 255, 0.08);
            --title-color: #ffffff;
            --text-color: rgba(255, 255, 255, 0.7);
            --body-font: 'Plus Jakarta Sans', sans-serif;
            --title-font: 'Space Grotesk', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            font-family: var(--body-font);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated Background Gradients */
        .bg-glow-1, .bg-glow-2 {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
            z-index: 1;
            pointer-events: none;
        }

        .bg-glow-1 {
            background: var(--first-color);
            top: 15%;
            left: 15%;
            animation: floatGlow 12s ease-in-out infinite alternate;
        }

        .bg-glow-2 {
            background: var(--second-color);
            bottom: 15%;
            right: 15%;
            animation: floatGlow 15s ease-in-out infinite alternate-reverse;
        }

        @keyframes floatGlow {
            0% {
                transform: translate(0, 0) scale(1);
            }
            100% {
                transform: translate(50px, 30px) scale(1.15);
            }
        }

        /* Glassmorphic Container */
        .container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 550px;
            padding: 3rem 2rem;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6),
                        inset 0 0 20px rgba(255, 255, 255, 0.02);
            text-align: center;
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Custom Spinning & Pulsating Loader */
        .loader-wrapper {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 2rem auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .loader-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px dashed rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top-color: var(--first-color);
            border-bottom-color: var(--second-color);
            animation: spin 3s linear infinite;
        }

        .loader-inner-circle {
            position: absolute;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--first-color), var(--second-color));
            opacity: 0.15;
            animation: pulse 2s ease-in-out infinite alternate;
        }

        .loader-icon {
            position: absolute;
            font-size: 2.5rem;
            color: #ffffff;
            animation: floatIcon 3s ease-in-out infinite alternate;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0% { transform: scale(0.85); opacity: 0.1; }
            100% { transform: scale(1.1); opacity: 0.25; }
        }

        @keyframes floatIcon {
            0% { transform: translateY(-3px); }
            100% { transform: translateY(3px); }
        }

        h1 {
            font-family: var(--title-font);
            font-size: 2.25rem;
            font-weight: 700;
            color: var(--title-color);
            margin-bottom: 1rem;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff 30%, var(--text-color) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-badge {
            display: inline-block;
            padding: 0.35rem 1rem;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            background: rgba(0, 242, 255, 0.1);
            color: var(--second-color);
            border: 1px solid rgba(0, 242, 255, 0.2);
            border-radius: 50px;
            margin-bottom: 1.5rem;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.1);
        }

        p {
            font-size: 1rem;
            line-height: 1.6;
            color: var(--text-color);
            margin-bottom: 2.5rem;
        }

        /* Action Buttons */
        .btn-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        .btn {
            padding: 0.8rem 1.6rem;
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 12px;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
            outline: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--first-color), var(--second-color));
            color: #050508;
            font-weight: 700;
            border: none;
            box-shadow: 0 8px 25px rgba(0, 242, 255, 0.25);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(0, 242, 255, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
        }

        @media (max-width: 480px) {
            .container {
                padding: 2.5rem 1.5rem;
            }
            h1 {
                font-size: 1.75rem;
            }
            .btn-group {
                flex-direction: column;
            }
            .btn {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="bg-glow-1"></div>
    <div class="bg-glow-2"></div>

    <div class="container">
        <div class="loader-wrapper">
            <div class="loader-ring"></div>
            <div class="loader-inner-circle"></div>
            <!-- Settings/Cog icon as svg -->
            <svg class="loader-icon" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.1a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path>
                <circle cx="12" cy="12" r="3"></circle>
            </svg>
        </div>

        <span class="status-badge">Under Process</span>
        <h1>Deployment in Progress</h1>
        <p>This project is currently under development or its live deployment is under process. Please check back later or check out the source code repositories!</p>

        <div class="btn-group">
            <a href="/" class="btn btn-primary">Back to Portfolio</a>
            <button onclick="window.close()" class="btn btn-secondary">Close Tab</button>
        </div>
    </div>
</body>
</html>
