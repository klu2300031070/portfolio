<!DOCTYPE html>
<html>
<head>
    <title>Process Image</title>
</head>
<body>
    <textarea id="output" style="width:100%; height:300px;"></textarea>
    <script>
        const img = new Image();
        img.src = "/src/assets/myanimated.png";
        img.onload = () => {
            const canvas = document.createElement("canvas");
            canvas.width = img.width;
            canvas.height = img.height;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0);
            
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imgData.data;
            const W = img.width;
            const H = img.height;
            
            const visited = new Uint8Array(W * H);
            const bgMask = new Uint8Array(W * H);
            const queue = [];
            
            function isCheckerboard(r, g, b) {
                const variance = Math.max(r, g, b) - Math.min(r, g, b);
                const brightness = (r + g + b) / 3.0;
                // Alternating squares are white/grey
                return variance < 15 && brightness > 140;
            }
            
            // Scan diagonals from corners to find seeds
            // Top-Left
            for (let i = 0; i < Math.min(W, H); i++) {
                const idx = (i + i * W) * 4;
                const r = data[idx], g = data[idx+1], b = data[idx+2];
                if (isCheckerboard(r, g, b)) {
                    queue.push(i, i);
                    visited[i + i * W] = 1;
                    break;
                }
            }
            // Top-Right
            for (let i = 0; i < Math.min(W, H); i++) {
                const x = W - 1 - i, y = i;
                const idx = (x + y * W) * 4;
                const r = data[idx], g = data[idx+1], b = data[idx+2];
                if (isCheckerboard(r, g, b)) {
                    queue.push(x, y);
                    visited[x + y * W] = 1;
                    break;
                }
            }
            // Bottom-Left
            for (let i = 0; i < Math.min(W, H); i++) {
                const x = i, y = H - 1 - i;
                const idx = (x + y * W) * 4;
                const r = data[idx], g = data[idx+1], b = data[idx+2];
                if (isCheckerboard(r, g, b)) {
                    queue.push(x, y);
                    visited[x + y * W] = 1;
                    break;
                }
            }
            // Bottom-Right
            for (let i = 0; i < Math.min(W, H); i++) {
                const x = W - 1 - i, y = H - 1 - i;
                const idx = (x + y * W) * 4;
                const r = data[idx], g = data[idx+1], b = data[idx+2];
                if (isCheckerboard(r, g, b)) {
                    queue.push(x, y);
                    visited[x + y * W] = 1;
                    break;
                }
            }
            
            // Flood fill
            let head = 0;
            while (head < queue.length) {
                const cx = queue[head++];
                const cy = queue[head++];
                const idx = (cx + cy * W) * 4;
                const r = data[idx], g = data[idx+1], b = data[idx+2], a = data[idx+3];
                
                if (isCheckerboard(r, g, b) || a === 0) {
                    bgMask[cx + cy * W] = 1;
                    
                    const neighbors = [
                        [cx+1, cy], [cx-1, cy], [cx, cy+1], [cx, cy-1]
                    ];
                    for (const [nx, ny] of neighbors) {
                        if (nx >= 0 && nx < W && ny >= 0 && ny < H) {
                            const nkey = nx + ny * W;
                            if (!visited[nkey]) {
                                visited[nkey] = 1;
                                queue.push(nx, ny);
                            }
                        }
                    }
                }
            }
            
            // Set background to transparent
            for (let x = 0; x < W; x++) {
                for (let y = 0; y < H; y++) {
                    if (bgMask[x + y * W]) {
                        const idx = (x + y * W) * 4;
                        data[idx] = 0;
                        data[idx+1] = 0;
                        data[idx+2] = 0;
                        data[idx+3] = 0;
                    }
                }
            }
            
            ctx.putImageData(imgData, 0, 0);
            document.getElementById("output").value = canvas.toDataURL("image/png");
        };
    </script>
</body>
</html>
